        .pin-value {

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        const inputMoney = document.getElementById('set-money');
        const inputPin = document.getElementById('set-pin');
        const displayMoney = document.getElementById('val-money');
        const displayPin = document.getElementById('val-pin');

        inputMoney.addEventListener('input', () => {
            displayMoney.innerText = inputMoney.value || "0";
        });

        inputPin.addEventListener('input', () => {
            displayPin.innerText = (inputPin.value || "AWAITING").toUpperCase();
        });

        document.getElementById('capture-btn').addEventListener('click', async () => {
            const target = document.getElementById('render-target');
            const statusMsg = document.getElementById('copy-status');
            const pain = document.get
            const canvas = await html2canvas(target, {
                scale: 4,
                backgroundColor: "#ffffff",
                useCORS: true,
                logging: false,
                onclone: (clonedDoc) => {
                    // Đảm bảo bộ lọc
                    const pin = clonedDoc.getElementById('val-pin');
                    if (pin) pin.style.filter = 'url(#thin-cut)';
                }
            });

            canvas.toBlob(async (blob) => {
                const item = new ClipboardItem({ [blob.type]: blob });
                await navigator.clipboard.write([item]);

                statusMsg.style.display = 'block';
                setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
            }, 'image/png', 1.0);

            canvas.toBlob(async (blob) => {
                try {
                    const item = new ClipboardItem({ [blob.type]: blob });
                    await navigator.clipboard.write([item]);

                    // Hiển thị thông báo dưới nút thay vì alert
                    statusMsg.style.display = 'block';

                    // Tự động ẩn thông báo sau 3 giây để giao diện gọn gàng
                    setTimeout(() => {
                        statusMsg.style.display = 'none';
                    }, 3000);

                } catch (err) {
                    console.error("Lỗi khi copy:", err);
                    statusMsg.innerText = "❌ Lỗi khi sao chép ảnh!";
                    statusMsg.style.color = "#ff3b30";
                    statusMsg.style.display = 'block';
                }
            }, 'image/png', 1.0); // Chất lượng tối đa

            function updatePinDisplay(text) {
                const displayPin = document.getElementById('val-pin');
                const upperText = (text || "AWAITING").toUpperCase();

                displayPin.innerHTML = '';

                [...upperText].forEach(char => {
                    const span = document.createElement('span');
                    span.innerText = char;
                    span.className = 'char';

                    if (char === 'Q') {
                        span.classList.add('q');
                    }

                    displayPin.appendChild(span);
                });

                // tắt mask cũ
                displayPin.style.setProperty('--pin-mask', 'none');
            }
        });
